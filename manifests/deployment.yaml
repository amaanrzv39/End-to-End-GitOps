apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-app
  template:
    metadata:
      labels:
        app: ml-app
    spec:
      containers:
      - name: ml-app-container
        image: gcr.io/project-cd8d3620-549d-44e4-ba7/smart-machines:latest
        ports:
        - containerPort: 5000  # Replace with the port your app listens on
